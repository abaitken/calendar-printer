<button data-bind="click: () => sidebar.open()" class="sidebar-btn dont-print">☰</button>

<div id="sidebar" class="sidebar">
    <h2>Print Calendar</h2>
    <a class="closebtn" data-bind="click: () => sidebar.close()">&times;</a>

    <button data-bind="click: () => importModel.open()">Import</button>
    <button data-bind="click: () => addEvent.createEvent()">Add Event</button>
    <button data-bind="click: () => allEvents.open()">Manage Events</button>
    <button data-bind="click: () => settings.open()">Settings</button>
    <button data-bind="click: () => exportModel.open()">Export</button>
    <button data-bind="click: () => aboutModel.open()">About</button>
</div>
