<dialog id="iconSelectorModal" class="modal" closedby="none" data-bind="with: iconSelector">
    <div class="modal-content">
        <div class="model-header">
            <h2>Select Icon</h2>
        </div>
        <div class="modal-body">
            <input type="text" data-bind="value: search, valueUpdate: 'keyup'" />
            <div class="tile-container">
                <!-- ko foreach: filteredIcons -->
                <div class="tile" data-bind="style: { color: $parent.color }, click: () => $parent.select($data), applyClasses: { condition: ($data === $parent.selectedIcon()), classNames: 'selectedIcon' }">
                    <i class="pickIcon mdi" data-bind="mdi: $data"></i>
                </div>
                <!-- /ko -->
            </div>
        </div>
        <div class="model-footer">
            <button data-bind="click: accept">Accept</button>
            <button data-bind="click: cancel">Cancel</button>
        </div>
    </div>
</dialog>
