<dialog id="exportModal" class="modal" closedby="none" data-bind="with: exportModel">
    <div class="modal-content">
        <div class="model-header">
            <h2>Export</h2>
        </div>
        <div class="modal-body">
            <div>
                <label for="format">Format:</label>
                <select
                    data-bind="options: exportFormats, value: selectedFormat, optionsText: 'name'" name="format"></select>
            </div>
            <div>
                <button data-bind="click: download">Download</button>
            </div>
        </div>
        <div class="model-footer">
            <button data-bind="click: close">Close</button>
        </div>
    </div>
</dialog>
