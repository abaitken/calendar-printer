<!DOCTYPE html>
<html lang="en" class="h-100">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Calendar Printer</title>
    <link rel="stylesheet" href="style/print.css">
</head>

<body>
    <div id="calendar" data-bind="with: calendar">
        <!-- <h1 data-bind="text: year"></h1> -->
    
        <!-- ko foreach: months -->
        <div class="month page-break">
            <h2 data-bind="text: title"></h2>
            <table>
            <thead data-bind="with: $parent">
                <tr data-bind="foreach: weekdays">
                    <td data-bind="text: name"></h3>
                </tr>
            </thead>
            
            <tbody>
                <!-- ko foreach: weeks -->
                <tr>
                
                    <!-- ko foreach: days -->
                    <td>
                        <!-- ko if: $data !== null -->
                        <span data-bind="text: day"></span>
                        <!-- /ko -->
                    </td>
                    <!-- /ko -->
                    
                </tr>
                <!-- /ko -->
            </tbody>
            </table>
        </div>
        <!-- /ko -->
    
    </div>
    <script src="bower_components/knockout/dist/knockout.js" type="text/javascript"></script>
    <script src="js/viewmodel.js" type="module"></script>
</body>


</html>
